<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Screener | Stock Price Predictor</title>
    <meta name="description" content="Browse and screen Nifty 50 and US top stocks with live prices, change percentages and sector filters.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>(function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    }());</script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top app-nav">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand" href="{{ url_for('index') }}">Stock Price Predictor</a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark / light mode">
                    <span class="icon-moon">🌙</span>
                    <span class="icon-sun">☀️</span>
                </button>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{{ url_for('screener') }}">Screener</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Market Indices Bar -->
    <div class="indices-bar" id="indices-bar">
        <div class="indices-inner" id="indices-inner">
            <span class="idx-loading">Loading market data…</span>
        </div>
    </div>

    <main class="container-fluid dashboard-shell px-3 px-lg-4">

        <!-- Hero -->
        <section class="screener-hero">
            <div>
                <p class="eyebrow mb-1">Live Market Data</p>
                <h1>Stock Screener</h1>
                <p class="screener-sub">Browse Nifty 50 and US top stocks with live prices. Click any row to run the full ML analysis.</p>
            </div>
            <!-- Inline search -->
            <div class="screener-search-wrap">
                <input id="scr-search" class="form-control" type="text" placeholder="🔍  Filter by name or symbol…" autocomplete="off">
            </div>
        </section>

        <!-- Controls row -->
        <div class="screener-controls">
            <!-- List tabs -->
            <div class="scr-tabs" role="tablist">
                <button class="scr-tab active" id="tab-nifty50" data-list="nifty50" role="tab" aria-selected="true">
                    🇮🇳 Nifty 50
                </button>
                <button class="scr-tab" id="tab-us30" data-list="us30" role="tab" aria-selected="false">
                    🇺🇸 US Top 30
                </button>
            </div>

            <!-- Sector filter -->
            <div class="scr-filters">
                <select id="scr-sector" class="form-select form-select-sm scr-select">
                    <option value="">All Sectors</option>
                </select>
                <select id="scr-sort" class="form-select form-select-sm scr-select">
                    <option value="name-asc">Name ↑</option>
                    <option value="price-desc">Price ↓</option>
                    <option value="price-asc">Price ↑</option>
                    <option value="change-desc">Change % ↓</option>
                    <option value="change-asc">Change % ↑</option>
                </select>
            </div>
        </div>

        <!-- Table -->
        <div class="scr-table-wrap">
            <!-- Skeleton loader -->
            <div id="scr-skeleton" class="scr-skeleton">
                <div class="scr-sk-row scr-sk-head"></div>
                <div class="scr-sk-row"></div>
                <div class="scr-sk-row"></div>
                <div class="scr-sk-row"></div>
                <div class="scr-sk-row"></div>
                <div class="scr-sk-row"></div>
                <div class="scr-sk-row"></div>
                <div class="scr-sk-row"></div>
            </div>

            <!-- Actual table -->
            <div id="scr-table-container" class="d-none">
                <table class="table table-hover align-middle app-table scr-table" id="scr-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th class="scr-th-sortable" data-col="name">Company</th>
                            <th>Symbol</th>
                            <th class="scr-th-sortable" data-col="sector">Sector</th>
                            <th class="scr-th-sortable text-end" data-col="price">Price</th>
                            <th class="scr-th-sortable text-end" data-col="change_pct">Change %</th>
                            <th class="text-end d-none d-md-table-cell">5D High</th>
                            <th class="text-end d-none d-md-table-cell">5D Low</th>
                            <th class="text-center">Analyze</th>
                        </tr>
                    </thead>
                    <tbody id="scr-tbody"></tbody>
                </table>
                <p class="scr-count" id="scr-count"></p>
            </div>

            <!-- Error state -->
            <div id="scr-error" class="alert alert-danger app-alert d-none" role="alert"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screener.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
</body>
</html>
